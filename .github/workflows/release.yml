name: Publish

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID to publish from'
        required: true
      confirm:
        description: 'Type "publish" to confirm release'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'publish'
    environment: nuget
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries from CI run
        uses: actions/download-artifact@v8
        with:
          path: binaries
          pattern: binary-*
          merge-multiple: true
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download package from CI run
        uses: actions/download-artifact@v8
        with:
          path: packages
          pattern: package-*
          merge-multiple: true
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        run: |
          echo "=== Binaries ==="
          ls -la binaries/
          echo "=== Packages ==="
          ls -la packages/

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: NuGet login (OIDC → temp API key)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: |
          for pkg in packages/*.nupkg; do
            echo "Publishing to NuGet.org: $(basename "$pkg")"
            dotnet nuget push "$pkg" \
              --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Publish to GitHub Packages
        run: |
          for pkg in packages/*.nupkg; do
            echo "Publishing to GitHub Packages: $(basename "$pkg")"
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --source https://nuget.pkg.github.com/richlander/index.json \
              --skip-duplicate
          done

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '<Version>' src/dotnet-install/dotnet-install.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            binaries/* \
            packages/*.nupkg \
            --title "dotnet-install ${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
