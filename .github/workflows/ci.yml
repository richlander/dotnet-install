name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi

          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "docs=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE"..HEAD)

          code=false
          docs=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              src/*|*.props|.github/workflows/*) code=true ;;
            esac
            case "$file" in
              *.md|docs/*) docs=true ;;
            esac
          done <<< "$CHANGED"

          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "docs=$docs" >> "$GITHUB_OUTPUT"

  markdownlint:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run markdownlint
        run: npx markdownlint-cli2 '**/*.md'

  build:
    needs: [changes, markdownlint]
    if: always() && needs.changes.outputs.code == 'true' && needs.markdownlint.result != 'failure'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
            cross: true
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: dotnet-install

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Build
        run: dotnet build dotnet-install/src/dotnet-install -c Release

      - name: Publish NativeAOT
        run: dotnet publish dotnet-install/src/dotnet-install -c Release -r ${{ matrix.rid }} -f net11.0

      - name: Smoke test
        if: ${{ !matrix.cross }}
        run: |
          dotnet-install/artifacts/publish/dotnet-install/release_net11.0_${{ matrix.rid }}/dotnet-install${{ runner.os == 'Windows' && '.exe' || '' }} --version
          dotnet-install/artifacts/publish/dotnet-install/release_net11.0_${{ matrix.rid }}/dotnet-install${{ runner.os == 'Windows' && '.exe' || '' }} --help

      - name: Package binary (tar.gz)
        if: runner.os != 'Windows'
        run: |
          cd dotnet-install/artifacts/publish/dotnet-install/release_net11.0_${{ matrix.rid }}
          tar -czf "$GITHUB_WORKSPACE/dotnet-install-${{ matrix.rid }}.tar.gz" dotnet-install

      - name: Package binary (zip)
        if: runner.os == 'Windows'
        run: |
          cd dotnet-install/artifacts/publish/dotnet-install/release_net11.0_${{ matrix.rid }}
          Compress-Archive -Path dotnet-install.exe -DestinationPath "$env:GITHUB_WORKSPACE/dotnet-install-${{ matrix.rid }}.zip"
        shell: pwsh

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.rid }}
          path: dotnet-install-${{ matrix.rid }}.*

  pack:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: dotnet-install

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Pack pointer package
        run: dotnet pack dotnet-install/src/dotnet-install -c Release -p:TargetFrameworks=net10.0 -p:OfficialBuild=true

      - name: Upload pointer package
        uses: actions/upload-artifact@v7
        with:
          name: package-pointer
          path: dotnet-install/artifacts/package/release/*.nupkg
          if-no-files-found: error

      - name: Pack any (non-AOT) package
        run: dotnet pack dotnet-install/src/dotnet-install -c Release -r any -p:TargetFrameworks=net10.0 -p:PublishAot=false -p:OfficialBuild=true

      - name: Upload any package
        uses: actions/upload-artifact@v7
        with:
          name: package-any
          path: dotnet-install/artifacts/package/release/*.nupkg
          if-no-files-found: error

      - name: Pack linux-x64 AOT package
        run: dotnet pack dotnet-install/src/dotnet-install -c Release -r linux-x64 -p:TargetFrameworks=net11.0 -p:OfficialAotBuild=true

      - name: Upload linux-x64 package
        uses: actions/upload-artifact@v7
        with:
          name: package-linux-x64
          path: dotnet-install/artifacts/package/release/*.nupkg
          if-no-files-found: error

  pack-rid:
    needs: build
    if: always() && needs.build.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-latest
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: dotnet-install

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Pack RID-specific package
        run: dotnet pack dotnet-install/src/dotnet-install -c Release -r ${{ matrix.rid }} -p:TargetFrameworks=net11.0 -p:OfficialAotBuild=true

      - name: Upload RID package
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.rid }}
          path: dotnet-install/artifacts/package/release/*.nupkg
          if-no-files-found: error
